    forceBypassScimRestrictions: $forceBypassScimRestrictions
    id: $id
  ) {
    success
  }
}

mutation UserUpdate($id: String!, $input: UserUpdateInput!) {
  userUpdate(id: $id, input: $input) {
    lastSyncId
    success
    user {
      id
      name
    }
  }
}

query VerifyGitHubEnterpriseServerInstallation($integrationId: String!) {
  verifyGitHubEnterpriseServerInstallation(integrationId: $integrationId) {
    success
  }
}

query Viewer {
  viewer {
    active
    admin
    app
    archivedAt
    avatarBackgroundColor
    avatarUrl
    calendarHash
    canAccessAnyPublicTeam
    createdAt
    createdIssueCount
    description
    disableReason
    displayName
    email
    gitHubUserId
    guest
    id
    identityProvider {
      id
    }
    initials
    inviteHash
    isAssignable
    isMe
    isMentionable
    lastSeen
    name
    organization {
      id
      name
    }
    owner
    statusEmoji
    statusLabel
    statusUntilAt
    supportsAgentSessions
    timezone
    title
    updatedAt
    url
  }
}

mutation ViewPreferencesCreate($input: ViewPreferencesCreateInput!) {
  viewPreferencesCreate(input: $input) {
    lastSyncId
    success
    viewPreferences {
      id
    }
  }
}

mutation ViewPreferencesDelete($id: String!) {
  viewPreferencesDelete(id: $id) {
    entityId
    lastSyncId
    success
  }
}

mutation ViewPreferencesUpdate($id: String!, $input: ViewPreferencesUpdateInput!) {
  viewPreferencesUpdate(id: $id, input: $input) {
    lastSyncId
    success
    viewPreferences {
      id
    }
  }
}

query Webhook($id: String!) {
  webhook(id: $id) {
    allPublicTeams
    archivedAt
    createdAt
    creator {
      id
      name
    }
    enabled
    failures {
      id
    }
    id
    label
    resourceTypes
    secret
    team {
      id
      name
    }
    teamIds
    updatedAt
    url
  }
}

mutation WebhookCreate($input: WebhookCreateInput!) {
  webhookCreate(input: $input) {
    lastSyncId
    success
    webhook {
      id
    }
  }
}

mutation WebhookDelete($id: String!) {
  webhookDelete(id: $id) {
    entityId
    lastSyncId
    success
  }
}

mutation WebhookRotateSecret($id: String!) {
  webhookRotateSecret(id: $id) {
    lastSyncId
    secret
    success
  }
}

query Webhooks($after: String, $before: String, $first: Int, $includeArchived: Boolean, $last: Int, $orderBy: PaginationOrderBy) {
  webhooks(
    after: $after
    before: $before
    first: $first
    includeArchived: $includeArchived
    last: $last
    orderBy: $orderBy
  ) {
    nodes {
      allPublicTeams
      archivedAt
      createdAt
      creator {
        id
        name
      }
      enabled
      failures {
        id
      }
      id
      label
      resourceTypes
      secret
      team {
        id
        name
      }
      teamIds
      updatedAt
      url
    }
  }
}

mutation WebhookUpdate($id: String!, $input: WebhookUpdateInput!) {
  webhookUpdate(id: $id, input: $input) {
    lastSyncId
    success
    webhook {
      id
    }
  }
}

query WorkflowState($id: String!) {
  workflowState(id: $id) {
    archivedAt
    color
    createdAt
    description
    id
    inheritedFrom {
      id
      name
    }
    name
    position
    team {
      id
      name
    }
    type
    updatedAt
  }
}

mutation WorkflowStateArchive($id: String!) {
  workflowStateArchive(id: $id) {
    entity {
      id
      name
    }
    lastSyncId
    success
  }
}

mutation WorkflowStateCreate($input: WorkflowStateCreateInput!) {
  workflowStateCreate(input: $input) {
    lastSyncId
    success
    workflowState {
      id
      name
    }
  }
}

query WorkflowStates($after: String, $before: String, $filter: WorkflowStateFilter, $first: Int, $includeArchived: Boolean, $last: Int, $orderBy: PaginationOrderBy) {
  workflowStates(
    after: $after
    before: $before
    filter: $filter
    first: $first
    includeArchived: $includeArchived
    last: $last
    orderBy: $orderBy
  ) {
    nodes {
      archivedAt
      color
      createdAt
      description
      id
      inheritedFrom {
        id
        name
      }
      name
      position
      team {
        id
        name
      }
      type
