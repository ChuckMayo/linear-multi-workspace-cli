name: Release

# Triggered ONLY by `git push` of a `v*` tag — this is the milestone release
# ceremony. v1 deliberately omits any manual-dispatch trigger so the firing
# surface is one event: a tag push by a maintainer. The structural test in
# `test/release-workflow.test.ts` asserts the absence of any other trigger.
on:
  push:
    tags:
      - 'v*'

# Do NOT cancel in-flight runs: a tag-pushed release MUST complete. Distinct
# tags get distinct concurrency groups; identical tags queue rather than
# pre-empt each other (RESEARCH §10 P13).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: lint + typecheck + test + build + verify-pack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # `verify-pack.mjs` does NOT trigger `prepack`, so the stamped SKILL.md
      # would be missing without an explicit stamp step. (The publish job gets
      # the stamp via `npm publish` -> prepack automatically.)
      - name: Stamp skill manifest
        run: node scripts/stamp-skill.mjs

      - name: Verify pack
        run: node scripts/verify-pack.mjs

  cold-start:
    name: cold-start budget (<500ms median)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stamp skill manifest
        run: node scripts/stamp-skill.mjs

      # Pack the tarball that `measure-cold-start.mjs` will time. The script
      # pre-installs the tarball once (post-install timing) and then times
      # `node bin/run.js --version` repeatedly to compute a median.
      - name: Pack tarball
        run: npm pack

      - name: Measure cold start
        run: node scripts/measure-cold-start.mjs

  smoke-matrix:
    name: smoke-${{ matrix.lane }}
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      # Don't let one failing lane abort the others — we want the full picture
      # before deciding whether to block publish (only release-blocking lanes
      # — plain-bash, claude-code-via-skill — can fail the job).
      fail-fast: false
      matrix:
        lane:
          - plain-bash               # release-blocking
          - claude-code-via-skill    # release-blocking
          - codex-cli-via-exec       # advisory (skip if no CODEX_TEST_API_KEY)
          - gemini-cli-via-exec      # advisory (skip if no GEMINI_TEST_API_KEY)
    env:
      LINEAR_TEST_API_KEY: ${{ secrets.LINEAR_TEST_API_KEY }}
      CODEX_TEST_API_KEY: ${{ secrets.CODEX_TEST_API_KEY }}
      GEMINI_TEST_API_KEY: ${{ secrets.GEMINI_TEST_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stamp skill manifest
        run: node scripts/stamp-skill.mjs

      - name: Pack tarball
        run: npm pack

      # SECURITY: pipe matrix.lane through `env:` so the shell receives it
      # via $LANE (quoted/parsed safely) instead of YAML-time interpolation
      # into the run: block. Direct `${{ matrix.lane }}` interpolation is
      # GitHub's canonical script-injection sink — even though current lane
      # values are static, a future lane name with shell metacharacters or
      # whitespace would splat into additional shell tokens.
      #
      # Tarball discovery uses `shopt -s nullglob` + array expansion so a
      # missing tarball fails loudly instead of `ls | head -1` returning
      # an empty string and silently misinvoking the smoke script.
      - name: Run lane
        env:
          LANE: ${{ matrix.lane }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=( linmux-*.tgz )
          if [ ${#tarballs[@]} -eq 0 ]; then
            echo "no linmux-*.tgz tarball found" >&2
            exit 1
          fi
          TARBALL="${tarballs[0]}"
          node scripts/smoke-runtime-matrix.mjs --lane="$LANE" --tarball="./$TARBALL"

  # ─────────────────────────────────────────────────────────────────────
  # Publishing uses npm Trusted Publishing (OIDC) — there is NO NPM_TOKEN
  # secret. The trusted publisher is configured on npmjs.com for the
  # `linmux` package: GitHub Actions -> ChuckMayo/linear-multi-workspace-cli
  # -> release.yml. npm authenticates via the GitHub OIDC id-token, and
  # `--provenance` produces a signed attestation automatically (the repo is
  # public). The FIRST publish of a brand-new package cannot use OIDC (npm
  # requires the package to already exist), so v0.1.0 was published with a
  # one-time token; every release from here is token-free.
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: npm publish (trusted publishing / OIDC)
    runs-on: ubuntu-latest
    needs: [ci, cold-start, smoke-matrix]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write          # MANDATORY for OIDC trusted publishing.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # `npm publish` triggers `prepack` (build + oclif manifest + stamp)
      # automatically, then uploads via OIDC, then `postpack` cleans the
      # stamped artifacts. No token env — the trusted publisher authorizes it.
      - name: Publish to npm
        run: npm publish --provenance --access public
