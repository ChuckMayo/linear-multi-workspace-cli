name: Close external PRs

# This project does not accept external pull requests at this stage. PRs from
# anyone other than the repo owner, repo collaborators, org members, or
# whitelisted bots are closed automatically with a friendly comment pointing
# at CONTRIBUTING.md.
#
# Trigger choice: `pull_request_target` runs in the context of the BASE repo
# (not the fork), so it has the permissions needed to comment + close. We do
# NOT check out the fork's code -- we only inspect PR metadata via the
# github-script context object -- so this avoids the well-known
# `pull_request_target` footgun (running untrusted code with secrets in scope).
# All user-controlled values (author login, PR number) flow through
# `context.payload.*` and into github-rest API calls -- they are never
# interpolated into a shell `run:` block.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

concurrency:
  group: close-external-prs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >-
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Comment and close
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            const body = [
              `Hi @${author} -- thanks for the contribution!`,
              ``,
              `This repository doesn't accept external pull requests at this stage of the project. Please see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for the rationale and the ways you *can* contribute (issues, forks, integration reports).`,
              ``,
              `If you've found a bug or want to discuss a change, [filing an issue](../issues/new) is the fastest path to the maintainer's attention. If your change is something this project should ship, the maintainer will pick it up and credit you in the changelog.`,
              ``,
              `Closing automatically -- no offense intended.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed',
            });
