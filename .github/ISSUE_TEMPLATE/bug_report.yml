name: Bug report
description: Something in the CLI behaves incorrectly, crashes, or contradicts its documented contract.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more specific the reproduction, the faster this gets fixed.
        **Redact your `LINEAR_API_KEY` before pasting any output.** If you see one in CLI output, that's its own bug — please tell us.

  - type: checkboxes
    id: pre-submission
    attributes:
      label: Pre-submission checklist
      options:
        - label: I read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).
          required: true
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I redacted my `LINEAR_API_KEY` from any pasted output.
          required: true
        - label: This is a real CLI bug, not a Linear API outage or a misconfiguration on my side.
          required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: Output of `npx -y linmux --version`.
      placeholder: "e.g. 0.4.2"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "e.g. v22.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other / WSL
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Agent runtime
      description: Where you invoked the CLI from.
      options:
        - Claude Code
        - OpenAI Codex CLI
        - Gemini CLI
        - Cursor
        - GitHub Copilot CLI
        - Plain shell (no agent)
        - Other
    validations:
      required: true

  - type: textarea
    id: what-you-ran
    attributes:
      label: What you ran
      description: The exact command line. Include `--json` if you used it.
      render: shell
    validations:
      required: true

  - type: textarea
    id: what-you-saw
    attributes:
      label: What you saw
      description: stdout + stderr. Redact `LINEAR_API_KEY` first.
      render: shell
    validations:
      required: true

  - type: textarea
    id: what-you-expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Every time
        - Sometimes
        - Once
        - Can't reproduce reliably
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much this blocks you.
      options:
        - Blocker — the CLI is unusable for my workflow
        - High — a major feature is broken; workarounds are painful
        - Medium — annoying but I have a workaround
        - Low — cosmetic or rare edge case
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else — guesses at root cause, related issues, environment quirks.
